<nav class="d-flex flex-column bg-light border-end vh-100 p-0" style="width: 220px;">
  <a *ngFor="let tab of tabs"
     class="nav-link px-3 py-3 border-start border-3 border-transparent"
     [class.active]="isActive(tab.route)"
     (click)="navigate(tab.route)">
    {{ tab.label }}
  </a>
</nav>
