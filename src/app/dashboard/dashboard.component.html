<div class="dashboard">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h4 class="fw-bold mb-1" style="color: #e2e8f0;">Dashboard</h4>
      <small class="text-muted">Overview of your social media posts</small>
    </div>
  </div>

  <div class="row g-3 mb-4 stagger-children">
    <div class="col-md-4" *ngFor="let stat of stats">
      <div class="stat-card h-100">
        <div class="d-flex justify-content-between align-items-start mb-3">
          <div class="stat-icon">
            <i class="bi {{ stat.icon }}"></i>
          </div>
        </div>
        <div class="mb-1">
          <span class="stat-label">{{ stat.label }}</span>
        </div>
        <h3>{{ stat.value }}</h3>
        <div class="mt-2">
          <span class="stat-change" [class.text-success]="stat.trend === 'up'" [class.text-danger]="stat.trend === 'down'">
            <i class="bi" [ngClass]="stat.trend === 'up' ? 'bi-arrow-up' : 'bi-arrow-down'"></i>
            {{ stat.change }}
          </span>
          <span class="text-muted ms-1 small">vs last month</span>
        </div>
      </div>
    </div>
  </div>
</div>
